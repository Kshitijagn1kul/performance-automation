name: k6 API Performance

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - local
          - staging
          - production

      test_type:
        description: Performance test type
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - baseline
          - load
          - stress
          - spike
          - endurance
          - sla
          - capacity

      target_vus:
        description: Target VUs for load/stress/spike tests
        required: false
        default: "300"

  pull_request:
    branches:
      - main

  schedule:
    - cron: "30 18 * * 1-5"

jobs:
  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 390

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
      TEST_TYPE: ${{ github.event.inputs.test_type || 'smoke' }}
      TARGET_VUS: ${{ github.event.inputs.target_vus || '300' }}

      # Repository Variable
      STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL }}

      # Secrets
      LOGIN_USR: ${{ secrets.K6_LOGIN_USR }}
      LOGIN_PWD: ${{ secrets.K6_LOGIN_PWD }}

      SUMMARY_FILE: results/ci-summary.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Environment Variables
        run: |
          echo "=================================="
          echo "ENVIRONMENT=$ENVIRONMENT"
          echo "TEST_TYPE=$TEST_TYPE"
          echo "TARGET_VUS=$TARGET_VUS"
          echo "STAGING_BASE_URL=$STAGING_BASE_URL"
          echo "=================================="

          if [ -z "$STAGING_BASE_URL" ]; then
            echo "❌ STAGING_BASE_URL is EMPTY"
          else
            echo "✅ STAGING_BASE_URL is PRESENT"
          fi

          if [ -z "$LOGIN_USR" ]; then
            echo "❌ LOGIN_USR is EMPTY"
          else
            echo "✅ LOGIN_USR is PRESENT"
          fi

          if [ -z "$LOGIN_PWD" ]; then
            echo "❌ LOGIN_PWD is EMPTY"
          else
            echo "✅ LOGIN_PWD is PRESENT"
          fi

          echo "=================================="

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate endpoint catalog from CSV
        run: |
          node scripts/generate-endpoints.mjs \
          "Recruitment_ v1.2.5 - Sheet1.csv" \
          data/generated/recruitment.endpoints.json

      - name: Run k6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/recruitment.js

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-results
          path: results/
